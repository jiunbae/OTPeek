name: OtpAuthenticator
options:
  bundleIdPrefix: com.otpauthenticator
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

configs:
  Debug: debug
  Release: release

# ---------------------------------------------------------------------------
# Shared building blocks (reused by every target via YAML anchors)
# ---------------------------------------------------------------------------

# otp-ffi 로 생성된 Swift 바인딩. include/ 는 C 헤더/모듈맵이므로 소스 컴파일에서 제외
# (xcframework 가 otpFFI 모듈을 제공한다).
generatedSources: &generatedSources
  path: Generated
  excludes:
    - "include/**"
    - "**/.DS_Store"

# Rust 코어 xcframework (정적 라이브러리 + otpFFI 모듈). embed 하지 않는다.
coreFramework: &coreFramework
  framework: Frameworks/OtpCore.xcframework
  embed: false

# 빌드 전에 xcframework 가 없으면 build-core.sh 로 생성한다(멱등).
buildCoreScript: &buildCoreScript
  name: Build Rust Core (otp-ffi)
  basedOnDependencyAnalysis: false
  script: |
    set -e
    if [ ! -d "${PROJECT_DIR}/Frameworks/OtpCore.xcframework" ]; then
      "${PROJECT_DIR}/scripts/build-core.sh"
    fi

targets:
  # iOS App
  OtpAuthenticator-iOS:
    type: application
    platform: iOS
    sources:
      - path: OtpAuthenticator
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - *generatedSources
    preBuildScripts:
      - *buildCoreScript
    dependencies:
      - *coreFramework
      - target: OtpWidgetExtension-iOS
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.otpauthenticator.app
        INFOPLIST_FILE: OtpAuthenticator/Info.plist
        CODE_SIGN_ENTITLEMENTS: OtpAuthenticator/OtpAuthenticator.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: OTP Authenticator
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        ENABLE_DEBUG_DYLIB: NO

  # macOS App
  OtpAuthenticator-macOS:
    type: application
    platform: macOS
    sources:
      - path: OtpAuthenticator
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - *generatedSources
    preBuildScripts:
      - *buildCoreScript
    dependencies:
      - *coreFramework
      - target: OtpWidgetExtension-macOS
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.otpauthenticator.app
        INFOPLIST_FILE: OtpAuthenticator/Info.plist
        CODE_SIGN_ENTITLEMENTS: OtpAuthenticator/OtpAuthenticator.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: OTP Authenticator
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        ENABLE_DEBUG_DYLIB: NO

  # iOS Widget Extension
  OtpWidgetExtension-iOS:
    type: app-extension
    platform: iOS
    sources:
      - path: OtpWidgetExtension
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - *generatedSources
    preBuildScripts:
      - *buildCoreScript
    dependencies:
      - *coreFramework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.otpauthenticator.app.widget
        INFOPLIST_FILE: OtpWidgetExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: OtpWidgetExtension/OtpWidgetExtension.entitlements
        PRODUCT_NAME: OtpWidget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic

  # macOS Widget Extension
  OtpWidgetExtension-macOS:
    type: app-extension
    platform: macOS
    sources:
      - path: OtpWidgetExtension
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - *generatedSources
    preBuildScripts:
      - *buildCoreScript
    dependencies:
      - *coreFramework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.otpauthenticator.app.widget
        INFOPLIST_FILE: OtpWidgetExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: OtpWidgetExtension/OtpWidgetExtension.entitlements
        PRODUCT_NAME: OtpWidget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic

schemes:
  OtpAuthenticator-iOS:
    build:
      targets:
        OtpAuthenticator-iOS: all
        OtpWidgetExtension-iOS: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  OtpAuthenticator-macOS:
    build:
      targets:
        OtpAuthenticator-macOS: all
        OtpWidgetExtension-macOS: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
