name: Otpeek
options:
  bundleIdPrefix: com.otpeek
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # 서명 팀. 배포 인증서(Apple Distribution / 3rd Party Mac Developer Installer)
    # 와 iCloud 컨테이너가 모두 이 팀 기반이라, 개발/배포를 728FW73BS8 로 통일한다.
    DEVELOPMENT_TEAM: 728FW73BS8
    # 공증(notarization) / App Store 배포에 필수. macOS 에만 적용되고 iOS 는 무시.
    ENABLE_HARDENED_RUNTIME: YES

configs:
  Debug: debug
  Release: release

# ---------------------------------------------------------------------------
# Shared building blocks (reused by every target via YAML anchors)
# ---------------------------------------------------------------------------

# otpeek-ffi 로 생성된 Swift 바인딩. include/ 는 C 헤더/모듈맵이므로 소스 컴파일에서 제외
# (xcframework 가 otpFFI 모듈을 제공한다).
generatedSources: &generatedSources
  path: Generated
  excludes:
    - "include/**"
    - "**/.DS_Store"

# Rust 코어 xcframework (정적 라이브러리 + otpFFI 모듈). embed 하지 않는다.
coreFramework: &coreFramework
  framework: Frameworks/OtpeekCore.xcframework
  embed: false

# 빌드 전에 xcframework 가 없으면 build-core.sh 로 생성한다(멱등).
buildCoreScript: &buildCoreScript
  name: Build Rust Core (otpeek-ffi)
  basedOnDependencyAnalysis: false
  script: |
    set -e
    if [ ! -d "${PROJECT_DIR}/Frameworks/OtpeekCore.xcframework" ]; then
      "${PROJECT_DIR}/scripts/build-core.sh"
    fi

# `.otpvault` 파일 연결 (Path C: 백업 파일을 열면 앱이 바로 가져오기로 진입).
# Exported UTI + CFBundleDocumentTypes 를 iOS/macOS 앱 타깃 Info.plist 에 심는다.
otpvaultExportedTypes: &otpvaultExportedTypes
  - UTTypeIdentifier: com.otpeek.otpvault
    UTTypeDescription: OTP Encrypted Vault
    UTTypeConformsTo:
      - public.data
    UTTypeTagSpecification:
      public.filename-extension:
        - otpvault

otpvaultDocumentTypes: &otpvaultDocumentTypes
  - CFBundleTypeName: OTP Encrypted Vault
    CFBundleTypeRole: Editor
    LSHandlerRank: Owner
    LSItemContentTypes:
      - com.otpeek.otpvault

# Custom URL scheme for app deep links, e.g.
#   otpeek://totp/GitHub:me?secret=...&issuer=GitHub   (== an otpauth:// URI)
#   otpeek://add?uri=<url-encoded otpauth:// URI>
#   otpeek://                                           (just open the app)
# NOTE: the standard otpauth:// scheme is intentionally NOT claimed here — it is
# the industry Key-URI format and must keep working with every other app.
deepLinkUrlTypes: &deepLinkUrlTypes
  - CFBundleURLName: com.otpeek.deeplink
    CFBundleURLSchemes:
      - otpeek

targets:
  # iOS App
  Otpeek-iOS:
    type: application
    platform: iOS
    sources:
      - path: Otpeek
        excludes:
          - "**/.DS_Store"
          # 타깃별 Info plist 는 아래 `info.path` 로 INFOPLIST_FILE 에 지정된다.
          # 소스로도 쓸어 담기면 다른 플랫폼 plist 가 Copy Bundle Resources 로 들어가
          # 번들 루트에 CFBundleExecutable=$(EXECUTABLE_NAME)(미치환) stray plist 를 남긴다.
          # CoreDevice 가 Info*.plist 글롭 시 Info-macOS.plist 를 먼저 읽어 실기기 설치가
          # "main executable could not be determined" 로 깨진다. 둘 다 리소스에서 제외.
          - "Info-iOS.plist"
          - "Info-macOS.plist"
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - *generatedSources
    preBuildScripts:
      - *buildCoreScript
    dependencies:
      - *coreFramework
      - target: OtpWidgetExtension-iOS
        embed: true
    # Info.plist 를 XcodeGen 이 생성한다(INFOPLIST_FILE 는 자동 설정). 문서 타입은
    # 여기 properties 로 주입. iOS 는 파일을 컨테이너로 복사하도록 in-place 를 끈다.
    info:
      path: Otpeek/Info-iOS.plist
      properties:
        CFBundleDisplayName: OTPeek
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "21"
        LSApplicationCategoryType: public.app-category.utilities
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: Camera access is needed to scan QR codes for adding accounts.
        NSFaceIDUsageDescription: Face ID unlocks your one-time codes.
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        LSSupportsOpeningDocumentsInPlace: false
        UTExportedTypeDeclarations: *otpvaultExportedTypes
        CFBundleDocumentTypes: *otpvaultDocumentTypes
        CFBundleURLTypes: *deepLinkUrlTypes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.otpeek.app
        CODE_SIGN_ENTITLEMENTS: Otpeek/Otpeek.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: OTPeek
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "21"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "OTPeek iOS AppStore 2026-07"
        ENABLE_DEBUG_DYLIB: NO

  # macOS App
  Otpeek-macOS:
    type: application
    platform: macOS
    sources:
      - path: Otpeek
        excludes:
          - "**/.DS_Store"
          # 타깃별 Info plist 는 아래 `info.path` 로 INFOPLIST_FILE 에 지정된다.
          # 소스로도 쓸어 담기면 다른 플랫폼 plist 가 Copy Bundle Resources 로 들어가
          # 번들 루트에 CFBundleExecutable=$(EXECUTABLE_NAME)(미치환) stray plist 를 남긴다.
          # CoreDevice 가 Info*.plist 글롭 시 Info-macOS.plist 를 먼저 읽어 실기기 설치가
          # "main executable could not be determined" 로 깨진다. 둘 다 리소스에서 제외.
          - "Info-iOS.plist"
          - "Info-macOS.plist"
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - *generatedSources
    preBuildScripts:
      - *buildCoreScript
    dependencies:
      - *coreFramework
      - target: OtpWidgetExtension-macOS
        embed: true
    # Info.plist 를 XcodeGen 이 생성한다(INFOPLIST_FILE 는 자동 설정). 문서 타입 주입.
    info:
      path: Otpeek/Info-macOS.plist
      properties:
        CFBundleDisplayName: OTPeek
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "23"
        LSApplicationCategoryType: public.app-category.utilities
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        ITSAppUsesNonExemptEncryption: false
        UTExportedTypeDeclarations: *otpvaultExportedTypes
        CFBundleDocumentTypes: *otpvaultDocumentTypes
        CFBundleURLTypes: *deepLinkUrlTypes
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.otpeek.app
        CODE_SIGN_ENTITLEMENTS: Otpeek/Otpeek.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: OTPeek
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "23"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "OTPeek macOS AppStore 1784287691"
        ENABLE_DEBUG_DYLIB: NO

  # iOS Widget Extension
  OtpWidgetExtension-iOS:
    type: app-extension
    platform: iOS
    sources:
      - path: OtpWidgetExtension
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - *generatedSources
    preBuildScripts:
      - *buildCoreScript
    dependencies:
      - *coreFramework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.otpeek.app.widget
        INFOPLIST_FILE: OtpWidgetExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: OtpWidgetExtension/OtpWidgetExtension.entitlements
        PRODUCT_NAME: OtpWidget
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "21"
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "OTPeek Widget iOS AppStore 2026-07"

  # macOS Widget Extension
  OtpWidgetExtension-macOS:
    type: app-extension
    platform: macOS
    sources:
      - path: OtpWidgetExtension
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
      - *generatedSources
    preBuildScripts:
      - *buildCoreScript
    dependencies:
      - *coreFramework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.otpeek.app.widget
        INFOPLIST_FILE: OtpWidgetExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: OtpWidgetExtension/OtpWidgetExtension.entitlements
        PRODUCT_NAME: OtpWidget
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "23"
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "OTPeek Widget macOS AppStore 1784287697"

schemes:
  Otpeek-iOS:
    build:
      targets:
        Otpeek-iOS: all
        OtpWidgetExtension-iOS: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  Otpeek-macOS:
    build:
      targets:
        Otpeek-macOS: all
        OtpWidgetExtension-macOS: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
